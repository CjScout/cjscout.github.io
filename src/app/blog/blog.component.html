<div class="blog-header">
    <h2>Blog</h2>
</div>
<div class="flex justify-content-center">
    <div class="blog-list">
        <a *ngFor="let post of posts" class="blog-list-item" [routerLink]="['/blog', post.slug]">
            <h3>{{ post.title }}</h3>
            <p class="post-date">{{ post.date }}</p>
            <p class="post-summary">{{ post.summary }}</p>
        </a>
    </div>
</div>
