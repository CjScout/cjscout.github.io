<div class="flex justify-content-center">
    <div class="article" *ngIf="post; else notFound">
        <a class="back-link" routerLink="/blog">&larr; Back to Blog</a>
        <h2>{{ post.title }}</h2>
        <p class="post-date">{{ post.date }}</p>
        <ng-container *ngFor="let block of post.body">
            <h3 *ngIf="isHeading(block)" class="article-heading">{{ block.heading }}</h3>
            <p *ngIf="!isHeading(block)"><ng-container *ngFor="let seg of segments(block)"><a *ngIf="isLink(seg); else plain" [href]="seg.href" target="_blank" rel="noopener noreferrer">{{ seg.text }}</a><ng-template #plain>{{ seg.text }}</ng-template></ng-container></p>
        </ng-container>
    </div>
</div>

<ng-template #notFound>
    <h3 style="text-align: center;">Post not found</h3>
    <p style="text-align: center;">That article doesn't exist. Head back to the <a routerLink="/blog">blog</a>?</p>
</ng-template>
